name: liquid-os
description: My personal OS image.
base-image: ghcr.io/ublue-os/aurora-dx-nvidia-open
image-version: stable

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: dnf
    repos:
      cleanup: true
      nonfree: negativo17
      copr:
        - atim/starship
      files:
        - https://negativo17.org/repos/fedora-steam.repo
    install:
      skip-unavailable: true
      packages:
        - starship
        - steam

  - type: script
    snippets:
      - |
        echo "--- CONFIGURAZIONE FLATPAK ---"
        mkdir -p /usr/share/ublue-os
        cat <<EOF > /usr/share/ublue-os/default-flatpaks.json
        {
          "system": {
            "install": [
              "org.gnome.Loupe",
              "org.telegram.desktop",
              "org.videolan.VLC",
              "org.kde.krita",
              "org.darktable.Darktable",
              "org.blender.Blender",
              "org.onlyoffice.desktopeditors",
              "com.transmissionbt.Transmission",
              "org.jellyfin.JellyfinServer",
              "org.kde.kdenlive",
              "fr.handbrake.ghb"
            ]
          }
        }
        EOF

  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - org.gnome.Loupe
          - org.telegram.desktop
          - org.videolan.VLC
          - org.kde.krita
          - org.darktable.Darktable
          - org.blender.Blender
          - org.onlyoffice.desktopeditors
          - com.transmissionbt.Transmission
          - org.jellyfin.JellyfinServer
          - org.kde.kdenlive
          - fr.handbrake.ghb

  - type: signing
