- type: script
    snippets:
      - |
        set -e
        echo "Installazione Cursor..."
        
        # 1. Download con User-Agent e controllo errori
        # Usiamo un URL alternativo che spesso è più stabile
        curl -L -f -A "Mozilla/5.0" -o /usr/bin/cursor.appimage "https://downloader.cursor.sh/linux/appImage/x64"
        
        # Verifica che il file sia stato effettivamente creato
        if [ ! -f /usr/bin/cursor.appimage ]; then
          echo "ERRORE: Download fallito, il file non esiste!"
          exit 1
        fi
        
        chmod +x /usr/bin/cursor.appimage
        
        # 2. Creazione Wrapper
        printf '#!/bin/bash\nexec /usr/bin/cursor.appimage --no-sandbox "$@"\n' > /usr/bin/cursor
        chmod +x /usr/bin/cursor
        
        # 3. File Desktop
        mkdir -p /usr/share/applications
        cat <<EOF > /usr/share/applications/cursor.desktop
        [Desktop Entry]
        Name=Cursor
        Exec=/usr/bin/cursor %U
        Terminal=false
        Type=Application
        Icon=code
        Categories=Development;TextEditor;
        EOF

      - |
        echo "Configurazione Flatpak JSON..."
        mkdir -p /usr/share/ublue-os
        cat <<EOF > /usr/share/ublue-os/default-flatpaks.json
        {
          "system": {
            "install": [
              "org.gnome.Loupe",
              "org.telegram.desktop",
              "org.videolan.VLC",
              "org.kde.krita",
              "org.darktable.Darktable",
              "org.blender.Blender",
              "org.onlyoffice.desktopeditors",
              "com.transmissionbt.Transmission",
              "org.jellyfin.JellyfinServer",
              "org.kde.kdenlive",
              "fr.handbrake.ghb"
            ]
          }
        }
        EOF
