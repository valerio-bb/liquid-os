# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: liquid-os
description: My personal OS image.
base-image: ghcr.io/ublue-os/aurora-dx-nvidia-open
image-version: stable

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: dnf
    repos:
      cleanup: true
      nonfree: negativo17
      copr:
        - atim/starship
      files:
        - https://negativo17.org/repos/fedora-steam.repo
    install:
      skip-unavailable: true
      packages:
        - starship
        - steam

  - type: script
    snippets:
      - |
        set -e
        echo "--- ATTESA STABILIZZAZIONE RETE ---"
        sleep 20
        
        echo "--- DOWNLOAD CURSOR ---"
        # Usiamo l'URL che punta alla versione specifica per evitare il 400 dell'API generica
        URL="https://downloader.cursor.sh/linux/appImage/x64"
        
        # Tentiamo il download con retry molto aggressivi
        curl -L --retry 10 --retry-delay 15 --connect-timeout 30 -f -A "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" -o /usr/bin/cursor.appimage "$URL"

        chmod +x /usr/bin/cursor.appimage
        
        echo "--- CREAZIONE WRAPPER ---"
        cat <<'EOF' > /usr/bin/cursor
        #!/bin/bash
        exec /usr/bin/cursor.appimage --no-sandbox "$@"
        EOF
        chmod +x /usr/bin/cursor
        
        echo "--- CREAZIONE DESKTOP FILE ---"
        mkdir -p /usr/share/applications
        cat <<EOF > /usr/share/applications/cursor.desktop
        [Desktop Entry]
        Name=Cursor
        Exec=/usr/bin/cursor %U
        Terminal=false
        Type=Application
        Icon=code
        Categories=Development;TextEditor;
        EOF

        echo "--- CONFIGURAZIONE FLATPAK JSON ---"
        mkdir -p /usr/share/ublue-os
        cat <<EOF > /usr/share/ublue-os/default-flatpaks.json
        {
          "system": {
            "install": [
              "org.gnome.Loupe",
              "org.telegram.desktop",
              "org.videolan.VLC",
              "org.kde.krita",
              "org.darktable.Darktable",
              "org.blender.Blender",
              "org.onlyoffice.desktopeditors",
              "com.transmissionbt.Transmission",
              "org.jellyfin.JellyfinServer",
              "org.kde.kdenlive",
              "fr.handbrake.ghb"
            ]
          }
        }
        EOF

  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - org.gnome.Loupe
          - org.telegram.desktop
          - org.videolan.VLC
          - org.kde.krita
          - org.darktable.Darktable
          - org.blender.Blender
          - org.onlyoffice.desktopeditors
          - com.transmissionbt.Transmission
          - org.jellyfin.JellyfinServer
          - org.kde.kdenlive
          - fr.handbrake.ghb

  - type: signing
