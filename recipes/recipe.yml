# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: liquid-os
description: This is my personal OS image.

base-image: ghcr.io/ublue-os/aurora-dx-nvidia-open
image-version: stable

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: dnf
    repos:
      cleanup: true
      nonfree: negativo17
      copr:
        - atim/starship
      files:
        - https://negativo17.org/repos/fedora-steam.repo
    install:
      skip-unavailable: true
      packages:
        - starship
        - steam

  - type: script
    snippets:
      - |
        echo "Installazione di Cursor..."
        curl -Lo /tmp/cursor.appimage "https://cursor.com/api/download?platform=linux&format=appimage"
        chmod +x /tmp/cursor.appimage
        cd /tmp
        ./cursor.appimage --appimage-extract
        mkdir -p /usr/lib/cursor
        mv squashfs-root/* /usr/lib/cursor/
        ln -sf /usr/lib/cursor/cursor /usr/bin/cursor
        
        # Icon & Desktop Entry
        mkdir -p /usr/share/applications
        cp /usr/lib/cursor/cursor.desktop /usr/share/applications/cursor.desktop
        sed -i 's|Exec=AppRun|Exec=/usr/bin/cursor --no-sandbox|g' /usr/share/applications/cursor.desktop
        sed -i 's|Icon=cursor|Icon=/usr/lib/cursor/cursor.png|g' /usr/share/applications/cursor.desktop
        rm /tmp/cursor.appimage

      - |
        echo "Forzo la configurazione Flatpak per Aurora..."
        # Questo assicura che ujust veda la TUA lista invece di quella di default
        mkdir -p /usr/share/ublue-os
        cat <<EOF > /usr/share/ublue-os/default-flatpaks.json
        {
          "system": {
            "install": [
              "org.gnome.Loupe",
              "org.telegram.desktop",
              "org.videolan.VLC",
              "org.kde.krita",
              "org.darktable.Darktable",
              "org.blender.Blender",
              "org.onlyoffice.desktopeditors",
              "com.transmissionbt.Transmission",
              "org.jellyfin.JellyfinServer",
              "org.kde.kdenlive",
              "fr.handbrake.ghb"
            ]
          }
        }
        EOF

  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - org.gnome.Loupe
          - org.telegram.desktop
          - org.videolan.VLC
          - org.kde.krita
          - org.darktable.Darktable
          - org.blender.Blender
          - org.onlyoffice.desktopeditors
          - com.transmissionbt.Transmission
          - org.jellyfin.JellyfinServer
          - org.kde.kdenlive
          - fr.handbrake.ghb

  - type: signing
