# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: liquid-os
description: This is my personal OS image.

base-image: ghcr.io/ublue-os/aurora-dx-nvidia-open
image-version: stable

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: dnf
    repos:
      cleanup: true
      nonfree: negativo17
      copr:
        - atim/starship
      files:
        - https://negativo17.org/repos/fedora-steam.repo
    install:
      skip-unavailable: true
      packages:
        - starship
        - steam

  - type: script
    snippets:
      - |
        echo "Installazione Cursor (Fix API track)..."
        mkdir -p /usr/lib/cursor
        # URL aggiornato con releaseTrack=stable
        curl -Lfo /usr/lib/cursor/cursor.appimage "https://cursor.com/api/download?platform=linux&format=appimage&releaseTrack=stable"
        
        chmod +x /usr/lib/cursor/cursor.appimage
        ln -sf /usr/lib/cursor/cursor.appimage /usr/bin/cursor
        
        # Creazione file Desktop
        mkdir -p /usr/share/applications
        cat <<EOF > /usr/share/applications/cursor.desktop
        [Desktop Entry]
        Name=Cursor
        Exec=/usr/bin/cursor --no-sandbox %U
        Terminal=false
        Type=Application
        Icon=code
        Categories=Development;TextEditor;
        EOF

      - |
        echo "Forzo configurazione Flatpak per Aurora..."
        mkdir -p /usr/share/ublue-os
        cat <<EOF > /usr/share/ublue-os/default-flatpaks.json
        {
          "system": {
            "install": [
              "org.gnome.Loupe",
              "org.telegram.desktop",
              "org.videolan.VLC",
              "org.kde.krita",
              "org.darktable.Darktable",
              "org.blender.Blender",
              "org.onlyoffice.desktopeditors",
              "com.transmissionbt.Transmission",
              "org.jellyfin.JellyfinServer",
              "org.kde.kdenlive",
              "fr.handbrake.ghb"
            ]
          }
        }
        EOF

  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - org.gnome.Loupe
          - org.telegram.desktop
          - org.videolan.VLC
          - org.kde.krita
          - org.darktable.Darktable
          - org.blender.Blender
          - org.onlyoffice.desktopeditors
          - com.transmissionbt.Transmission
          - org.jellyfin.JellyfinServer
          - org.kde.kdenlive
          - fr.handbrake.ghb

  - type: signing
