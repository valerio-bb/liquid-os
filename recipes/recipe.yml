name: liquid-os
description: This is my personal OS image.
base-image: ghcr.io/ublue-os/aurora-dx-nvidia-open
image-version: stable
modules:
  - type: files
    files:
      - source: system
        destination: /
  - type: dnf
    repos:
      cleanup: true
      nonfree: negativo17
      copr:
        - atim/starship
      files:
        - https://negativo17.org/repos/fedora-steam.repo
    install:
      skip-unavailable: true
      packages:
        - starship
        - steam
  - type: script
    snippets:
      - |
        set -e
        echo "Installazione Cursor..."
        curl -L -f -A "Mozilla/5.0" -o /usr/bin/cursor.appimage "https://downloader.cursor.sh/linux/appImage/x64"
        if [ ! -f /usr/bin/cursor.appimage ]; then echo "Errore download"; exit 1; fi
        chmod +x /usr/bin/cursor.appimage
        printf '#!/bin/bash\nexec /usr/bin/cursor.appimage --no-sandbox "$@"\n' > /usr/bin/cursor
        chmod +x /usr/bin/cursor
        mkdir -p /usr/share/applications
        cat <<EOF > /usr/share/applications/cursor.desktop
        [Desktop Entry]
        Name=Cursor
        Exec=/usr/bin/cursor %U
        Terminal=false
        Type=Application
        Icon=code
        Categories=Development;TextEditor;
        EOF
      - |
        echo "Configurazione Flatpak..."
        mkdir -p /usr/share/ublue-os
        cat <<EOF > /usr/share/ublue-os/default-flatpaks.json
        {
          "system": {
            "install": [
              "org.gnome.Loupe",
              "org.telegram.desktop",
              "org.videolan.VLC",
              "org.kde.krita",
              "org.darktable.Darktable",
              "org.blender.Blender",
              "org.onlyoffice.desktopeditors",
              "com.transmissionbt.Transmission",
              "org.jellyfin.JellyfinServer",
              "org.kde.kdenlive",
              "fr.handbrake.ghb"
            ]
          }
        }
        EOF
  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - org.gnome.Loupe
          - org.telegram.desktop
          - org.videolan.VLC
          - org.kde.krita
          - org.darktable.Darktable
          - org.blender.Blender
          - org.onlyoffice.desktopeditors
          - com.transmissionbt.Transmission
          - org.jellyfin.JellyfinServer
          - org.kde.kdenlive
          - fr.handbrake.ghb
  - type: signing
