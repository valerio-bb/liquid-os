name: liquid-os
description: My personal OS image.
base-image: ghcr.io/ublue-os/aurora-dx-nvidia-open
image-version: stable

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: dnf
    repos:
      cleanup: true
      nonfree: negativo17
      copr:
        - atim/starship
      files:
        - https://negativo17.org/repos/fedora-steam.repo
    install:
      skip-unavailable: true
      packages:
        - starship
        - steam

  - type: script
    snippets:
      - |
        set -e
        echo "--- TENTATIVO DOWNLOAD CURSOR ---"
        
        # Usiamo curl con 5 tentativi automatici in caso di errore DNS o rete
        # Se il primo URL fallisce, prova il secondo (fallback)
        URL1="https://downloader.cursor.sh/linux/appImage/x64"
        URL2="https://cursor.com/api/download?platform=linux&format=appimage"
        
        curl -L --retry 5 --retry-delay 10 -f -A "Mozilla/5.0" -o /usr/bin/cursor.appimage "$URL1" || \
        curl -L --retry 5 --retry-delay 10 -f -A "Mozilla/5.0" -o /usr/bin/cursor.appimage "$URL2"

        chmod +x /usr/bin/cursor.appimage
        
        echo "--- CREAZIONE WRAPPER ---"
        cat <<'EOF' > /usr/bin/cursor
        #!/bin/bash
        exec /usr/bin/cursor.appimage --no-sandbox "$@"
        EOF
        chmod +x /usr/bin/cursor
        
        echo "--- CREAZIONE DESKTOP FILE ---"
        mkdir -p /usr/share/applications
        cat <<EOF > /usr/share/applications/cursor.desktop
        [Desktop Entry]
        Name=Cursor
        Exec=/usr/bin/cursor %U
        Terminal=false
        Type=Application
        Icon=code
        Categories=Development;TextEditor;
        EOF

      - |
        echo "--- CONFIGURAZIONE FLATPAK ---"
        mkdir -p /usr/share/ublue-os
        cat <<EOF > /usr/share/ublue-os/default-flatpaks.json
        {
          "system": {
            "install": [
              "org.gnome.Loupe",
              "org.telegram.desktop",
              "org.videolan.VLC",
              "org.kde.krita",
              "org.darktable.Darktable",
              "org.blender.Blender",
              "org.onlyoffice.desktopeditors",
              "com.transmissionbt.Transmission",
              "org.jellyfin.JellyfinServer",
              "org.kde.kdenlive",
              "fr.handbrake.ghb"
            ]
          }
        }
        EOF

  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - org.gnome.Loupe
          - org.telegram.desktop
          - org.videolan.VLC
          - org.kde.krita
          - org.darktable.Darktable
          - org.blender.Blender
          - org.onlyoffice.desktopeditors
          - com.transmissionbt.Transmission
          - org.jellyfin.JellyfinServer
          - org.kde.kdenlive
          - fr.handbrake.ghb

  - type: signing
