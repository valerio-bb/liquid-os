# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: liquid-os
description: This is my personal OS image.

base-image: ghcr.io/ublue-os/aurora-dx-nvidia-open
image-version: stable

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: dnf
    repos:
      cleanup: true
      nonfree: negativo17
      copr:
        - atim/starship
      files:
        - https://negativo17.org/repos/fedora-steam.repo
    install:
      skip-unavailable: true
      packages:
        - starship
        - steam
        
- type: script
    snippets:
      - |
        echo "Installazione Cursor..."
        # Crea la cartella di destinazione
        mkdir -p /usr/lib/cursor
        
        # Scarica l'AppImage direttamente lì
        curl -Lo /usr/lib/cursor/cursor.appimage "https://cursor.com/api/download?platform=linux&format=appimage"
        
        # Rendi eseguibile
        chmod +x /usr/lib/cursor/cursor.appimage
        
        # Crea il link simbolico in /usr/bin
        ln -sf /usr/lib/cursor/cursor.appimage /usr/bin/cursor
        
        # Crea il file .desktop da zero
        cat <<EOF > /usr/share/applications/cursor.desktop
        [Desktop Entry]
        Name=Cursor
        Exec=/usr/bin/cursor --no-sandbox %U
        Terminal=false
        Type=Application
        Icon=code
        Categories=Development;TextEditor;
        Comment=AI Powered Code Editor
        EOF

  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - org.gnome.Loupe
          - org.telegram.desktop
          - org.videolan.VLC
          - org.kde.krita
          - org.darktable.Darktable
          - org.blender.Blender
          - org.onlyoffice.desktopeditors
          - com.transmissionbt.Transmission
          - org.jellyfin.JellyfinServer
          - org.kde.kdenlive
          - fr.handbrake.ghb

  - type: signing
